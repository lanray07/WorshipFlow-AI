name: TestFlight Upload

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/testflight-upload.yml"
      - "WorshipFlowAI/**"
      - "WorshipFlowAI.xcodeproj/**"
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional build number override"
        required: false
        type: string

env:
  PROJECT_PATH: WorshipFlowAI.xcodeproj
  SCHEME: WorshipFlowAI
  CONFIGURATION: Release
  BUNDLE_ID: com.worshipflowai.app
  PROFILE_NAME: WorshipFlow AI App Store CI

jobs:
  upload:
    name: Archive and Upload to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          elif [ -d /Applications/Xcode_26.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version
          sudo xcodebuild -runFirstLaunch
          xcodebuild -downloadPlatform iOS -architectureVariant universal || xcodebuild -downloadPlatform iOS || true
          xcodebuild -showsdks
          xcrun simctl list runtimes

      - name: Validate required secrets
        run: |
          missing=0
          for name in APPLE_TEAM_ID APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_API_PRIVATE_KEY KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf "%s" "$APP_STORE_CONNECT_API_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8"

      - name: Create App Store signing assets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8"
          PROFILE_NAME="WorshipFlow AI App Store CI $GITHUB_RUN_NUMBER"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          openssl genrsa -out "$RUNNER_TEMP/apple_distribution.key" 2048
          openssl req -new \
            -key "$RUNNER_TEMP/apple_distribution.key" \
            -out "$RUNNER_TEMP/apple_distribution.csr" \
            -subj "/CN=WorshipFlow AI CI"

          cat > "$RUNNER_TEMP/appstore_jwt.rb" <<'RUBY'
          require "base64"
          require "json"
          require "openssl"

          def b64url(value)
            Base64.urlsafe_encode64(value, padding: false)
          end

          def int_to_bytes(value)
            hex = value.to_s(16)
            hex = "0#{hex}" if hex.length.odd?
            [hex].pack("H*").rjust(32, "\x00")
          end

          key_id = ENV.fetch("APP_STORE_CONNECT_API_KEY_ID")
          issuer_id = ENV.fetch("APP_STORE_CONNECT_ISSUER_ID")
          key = OpenSSL::PKey::EC.new(File.read(ENV.fetch("API_KEY_PATH")))

          header = { alg: "ES256", kid: key_id, typ: "JWT" }
          payload = {
            iss: issuer_id,
            exp: Time.now.to_i + 20 * 60,
            aud: "appstoreconnect-v1"
          }

          signing_input = "#{b64url(header.to_json)}.#{b64url(payload.to_json)}"
          digest = OpenSSL::Digest::SHA256.digest(signing_input)
          signature = OpenSSL::ASN1.decode(key.dsa_sign_asn1(digest))
          raw_signature = signature.value.map { |integer| int_to_bytes(integer.value) }.join
          puts "#{signing_input}.#{b64url(raw_signature)}"
          RUBY

          export API_KEY_PATH
          JWT=$(ruby "$RUNNER_TEMP/appstore_jwt.rb")

          python3 - \
            "$RUNNER_TEMP/apple_distribution.csr" \
            "$RUNNER_TEMP/certificate-request.json" <<'PY'
          import json, pathlib, sys
          request = {
              "data": {
                  "type": "certificates",
                  "attributes": {
                      "certificateType": "IOS_DISTRIBUTION",
                      "csrContent": pathlib.Path(sys.argv[1]).read_text(),
                  },
              }
          }
          pathlib.Path(sys.argv[2]).write_text(json.dumps(request))
          PY

          curl -sS \
            -X POST "https://api.appstoreconnect.apple.com/v1/certificates" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d @"$RUNNER_TEMP/certificate-request.json" \
            -o "$RUNNER_TEMP/certificate-response.json"

          python3 - \
            "$RUNNER_TEMP/certificate-response.json" \
            "$RUNNER_TEMP/certificate-id.txt" \
            "$RUNNER_TEMP/apple_distribution.cer.b64" <<'PY'
          import json, pathlib, sys
          response = json.loads(pathlib.Path(sys.argv[1]).read_text())
          if "errors" in response:
              print(json.dumps(response["errors"], indent=2))
              raise SystemExit("Failed to create Apple Distribution certificate.")
          data = response["data"]
          pathlib.Path(sys.argv[2]).write_text(data["id"])
          pathlib.Path(sys.argv[3]).write_text(data["attributes"]["certificateContent"])
          PY

          base64 -D -i "$RUNNER_TEMP/apple_distribution.cer.b64" -o "$RUNNER_TEMP/apple_distribution.cer"
          security import "$RUNNER_TEMP/apple_distribution.key" -A -k "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/apple_distribution.cer" -A -t cert -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          SIGNING_CERTIFICATE=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/"((Apple|iPhone) Distribution:|Apple Distribution)/ { print $2; exit }')
          if [ -z "$SIGNING_CERTIFICATE" ]; then
            echo "::error::Generated signing assets did not install an Apple/iPhone Distribution identity."
            exit 1
          fi
          echo "Using signing certificate: $SIGNING_CERTIFICATE"

          BUNDLE_IDS_URL="https://api.appstoreconnect.apple.com/v1/bundleIds?filter%5Bidentifier%5D=$BUNDLE_ID"
          curl -sS \
            "$BUNDLE_IDS_URL" \
            -H "Authorization: Bearer $JWT" \
            -o "$RUNNER_TEMP/bundle-ids-response.json"

          CERTIFICATE_ID=$(cat "$RUNNER_TEMP/certificate-id.txt")
          BUNDLE_ID_RESOURCE=$(python3 - "$RUNNER_TEMP/bundle-ids-response.json" <<'PY'
          import json, pathlib, sys
          response = json.loads(pathlib.Path(sys.argv[1]).read_text())
          if "errors" in response:
              print(json.dumps(response["errors"], indent=2))
              raise SystemExit("Failed to fetch bundle IDs.")
          data = response.get("data", [])
          if not data:
              raise SystemExit("No App Store Connect bundle ID resource found for the app bundle identifier.")
          print(data[0]["id"])
          PY
          )

          cat > "$RUNNER_TEMP/profile-request.json" <<EOF
          {
            "data": {
              "type": "profiles",
              "attributes": {
                "name": "$PROFILE_NAME",
                "profileType": "IOS_APP_STORE"
              },
              "relationships": {
                "bundleId": {
                  "data": {
                    "type": "bundleIds",
                    "id": "$BUNDLE_ID_RESOURCE"
                  }
                },
                "certificates": {
                  "data": [
                    {
                      "type": "certificates",
                      "id": "$CERTIFICATE_ID"
                    }
                  ]
                }
              }
            }
          }
          EOF

          curl -sS \
            -X POST "https://api.appstoreconnect.apple.com/v1/profiles" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d @"$RUNNER_TEMP/profile-request.json" \
            -o "$RUNNER_TEMP/profile-response.json"

          python3 - \
            "$RUNNER_TEMP/profile-response.json" \
            "$RUNNER_TEMP/profile-uuid.txt" \
            "$RUNNER_TEMP/profile.mobileprovision.b64" <<'PY'
          import json, pathlib, sys
          response = json.loads(pathlib.Path(sys.argv[1]).read_text())
          if "errors" in response:
              print(json.dumps(response["errors"], indent=2))
              raise SystemExit("Failed to create App Store provisioning profile.")
          attributes = response["data"]["attributes"]
          pathlib.Path(sys.argv[2]).write_text(attributes["uuid"])
          pathlib.Path(sys.argv[3]).write_text(attributes["profileContent"])
          PY

          PROFILE_UUID=$(cat "$RUNNER_TEMP/profile-uuid.txt")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          base64 -D -i "$RUNNER_TEMP/profile.mobileprovision.b64" -o "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "SIGNING_CERTIFICATE=$SIGNING_CERTIFICATE"
          } >> "$GITHUB_ENV"

      - name: Resolve packages
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -resolvePackageDependencies

      - name: Set build number
        if: ${{ inputs.build_number != '' }}
        run: |
          xcrun agvtool new-version -all "${{ inputs.build_number }}"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/WorshipFlowAI.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_CERTIFICATE" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>$SIGNING_CERTIFICATE</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/WorshipFlowAI.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Validate exported signature
        run: |
          set -euo pipefail

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file was exported."
            exit 1
          fi

          SIGNATURE_CHECK_DIR="$RUNNER_TEMP/signature-check"
          rm -rf "$SIGNATURE_CHECK_DIR"
          mkdir -p "$SIGNATURE_CHECK_DIR"
          unzip -q "$IPA_PATH" -d "$SIGNATURE_CHECK_DIR"

          APP_PATH=$(find "$SIGNATURE_CHECK_DIR/Payload" -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in exported IPA."
            exit 1
          fi

          echo "Verifying code signature for $APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | tee "$RUNNER_TEMP/codesign-details.log"

          if ! grep -Eq "Authority=(Apple|iPhone) Distribution" "$RUNNER_TEMP/codesign-details.log"; then
            echo "::error::Exported IPA is not signed with an Apple/iPhone Distribution certificate."
            exit 1
          fi

          PROFILE_PATH="$APP_PATH/embedded.mobileprovision"
          if [ ! -f "$PROFILE_PATH" ]; then
            echo "::error::Exported app is missing embedded.mobileprovision."
            exit 1
          fi

          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/embedded-profile.plist"
          PROFILE_NAME_VALUE=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/embedded-profile.plist")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/embedded-profile.plist")
          PROFILE_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$RUNNER_TEMP/embedded-profile.plist")

          echo "Provisioning profile: $PROFILE_NAME_VALUE"
          echo "Profile app identifier: $PROFILE_APP_ID"
          echo "Profile team ID: $PROFILE_TEAM_ID"

          if /usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" "$RUNNER_TEMP/embedded-profile.plist" >/dev/null 2>&1; then
            echo "::error::Embedded provisioning profile contains ProvisionedDevices, which means it is not an App Store distribution profile."
            exit 1
          fi

          if /usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" "$RUNNER_TEMP/embedded-profile.plist" >/dev/null 2>&1; then
            echo "::error::Embedded provisioning profile is an enterprise profile, not an App Store profile."
            exit 1
          fi

          if [ "$PROFILE_TEAM_ID" != "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "::error::Embedded provisioning profile team ID does not match APPLE_TEAM_ID."
            exit 1
          fi

      - name: Validate IPA with App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" -print -quit)
          VALIDATION_LOG="$RUNNER_TEMP/altool-validation.log"
          xcrun altool \
            --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1 | tee "$VALIDATION_LOG"

          if grep -E "Validation failed|ITMS-|Error" "$VALIDATION_LOG"; then
            echo "::error::App Store Connect validation failed."
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorshipFlowAI-ipa
          path: ${{ runner.temp }}/export/*.ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file was exported."
            exit 1
          fi

          UPLOAD_LOG="$RUNNER_TEMP/altool-upload.log"
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1 | tee "$UPLOAD_LOG"

          if grep -E "UPLOAD FAILED|Validation failed|Failed to upload package" "$UPLOAD_LOG"; then
            echo "::error::App Store Connect upload failed validation."
            exit 1
          fi
